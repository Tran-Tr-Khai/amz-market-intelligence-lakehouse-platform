services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio_data:/data
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lakehouse-tntkhai
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Spark Standalone Cluster
  #
  # Dev note: Dagster currently runs LOCAL (outside Docker). The SparkResource
  # uses master("local[*]") by default so the driver is in-process with Dagster
  # and reaches MinIO at http://localhost:9000.
  #
  # When Dagster is containerized, switch SPARK_MASTER_URL to
  # "spark://spark-master:7077" and set MINIO_ENDPOINT to "minio:9000".
  # ---------------------------------------------------------------------------
  spark-master:
    image: apache/spark:3.5.1-python3
    container_name: spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "7077:7077"   # Spark cluster port
      - "8080:8080"   # Spark Master Web UI
    volumes:
      - ./spark/jars:/opt/bitnami/spark/jars/extra
      - ./spark/conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
    networks:
      - lakehouse-tntkhai
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.1-python3
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: "2"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "8081:8081"   # Spark Worker Web UI
    volumes:
      - ./spark/jars:/opt/bitnami/spark/jars/extra
      - ./spark/conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
    networks:
      - lakehouse-tntkhai
    restart: unless-stopped

networks:
  lakehouse-tntkhai:
    driver: bridge
    name: lakehouse-tntkhai










